name: acronous_ai_flutter
description: "Acronous AI - AI Chat Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  flutter_tts: ^4.2.2
  speech_to_text: ^7.0.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  camera: ^0.11.1
  path_provider: ^2.1.0
  intl: ^0.20.2
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/Apex_Ai_svj_logo.png
