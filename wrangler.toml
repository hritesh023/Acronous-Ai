name = "acronous-ai"
compatibility_date = "2026-05-30"
pages_build_output_dir = "build/web"
# ── Environment variables (non-secret) ───────────────────────────────────
[vars]
OPENROUTER_MODEL = "meta-llama/llama-3.3-70b-instruct"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
ENABLE_WEB = "true"
ENABLE_VISION = "true"
ENABLE_VOICE = "true"
# After deploying Flutter web to Cloudflare Pages, paste its URL here:
PAGES_ORIGIN = "https://acronous.com"

# ── Optional KV namespace for conversations ──────────────────────────────
# [[kv_namespaces]]
# binding = "acronous_kv"
# id = "your-kv-namespace-id-here"
