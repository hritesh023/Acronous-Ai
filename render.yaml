services:
  # Backend API Service
  - type: web
    name: apex-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: cd backend_api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APEX_LLM_PROVIDER
        sync: false
      - key: APEX_LLM_API_KEY
        sync: false
      - key: APEX_LLM_MODEL
        value: gpt-4o-mini
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: APEX_SEARCH
        value: duckduckgo
      - key: APEX_ENABLE_WEB
        value: "true"
      - key: APEX_ENABLE_VISION
        value: "true"
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: apex-ai-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend-web && npm install && npm run build
    staticPublishPath: ./frontend-web/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true
