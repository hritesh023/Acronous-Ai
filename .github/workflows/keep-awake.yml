name: Keep HF Space Awake

on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Acronous AI Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://hritesh0214-acronous-ai.hf.space/v1/health)
          echo "Health check returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed, trying /health endpoint..."
            STATUS2=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://hritesh0214-acronous-ai.hf.space/health)
            echo "Fallback health check returned: $STATUS2"
          fi
